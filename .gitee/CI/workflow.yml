# Gitee CI/CD — 手动触发构建三平台安装包
# 触发方式：Gitee 页面 → CI/CD → 手动运行
# 产出：x86_64 Linux / ARM64 Linux / Windows 安装包

stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

# ═══════════════════════════════════════════
# x86_64 Linux 构建
# ═══════════════════════════════════════════
build-linux-x86_64:
  stage: build
  image: ubuntu:22.04
  when: manual  # 手动触发
  script:
    - apt-get update
    - apt-get install -y curl wget git
    # 安装 Node.js
    - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    - apt-get install -y nodejs
    # 安装 Rust
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    # 安装系统依赖
    - apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup2.4-dev libjavascriptcoregtk-4.0-dev
    # 构建前端
    - cd src && npm ci && npm run build && cd ..
    # 构建 Tauri
    - cargo tauri build
    # 提取产物
    - mkdir -p artifacts
    - cp src-tauri/target/release/bundle/deb/*.deb artifacts/ || true
    - cp src-tauri/target/release/bundle/nsis/*.exe artifacts/ || true
  artifacts:
    paths:
      - artifacts/
    expire_in: 7 days

# ═══════════════════════════════════════════
# ARM64 Linux 构建 (交叉编译)
# ═══════════════════════════════════════════
build-linux-arm64:
  stage: build
  image: ubuntu:22.04
  when: manual  # 手动触发
  script:
    - apt-get update
    - apt-get install -y curl wget git
    # 安装 Node.js
    - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    - apt-get install -y nodejs
    # 安装 Rust + ARM64 target
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    - rustup target add aarch64-unknown-linux-gnu
    # 安装交叉编译工具链
    - dpkg --add-architecture arm64
    - apt-get update
    - apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
    # 配置交叉编译
    - mkdir -p .cargo
    - |
      cat > .cargo/config.toml << EOF
      [target.aarch64-unknown-linux-gnu]
      linker = "aarch64-linux-gnu-gcc"
      rustflags = ["-L", "/usr/aarch64-linux-gnu/lib"]
      EOF
    # 构建前端
    - cd src && npm ci && npm run build && cd ..
    # 构建 Tauri (ARM64)
    - cargo tauri build --target aarch64-unknown-linux-gnu
    # 提取产物
    - mkdir -p artifacts
    - cp src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb artifacts/ || true
  artifacts:
    paths:
      - artifacts/
    expire_in: 7 days

# ═══════════════════════════════════════════
# Windows 构建
# ═══════════════════════════════════════════
build-windows:
  stage: build
  tags:
    - windows  # 需要 Windows runner
  when: manual  # 手动触发
  script:
    # 安装 Node.js
    - nvm install 18
    - nvm use 18
    # 构建前端
    - cd src
    - npm ci
    - npm run build
    - cd ..
    # 构建 Tauri
    - cargo tauri build
    # 提取产物
    - mkdir artifacts
    - copy src-tauri\target\release\bundle\nsis\*.exe artifacts\
  artifacts:
    paths:
      - artifacts/
    expire_in: 7 days

# ═══════════════════════════════════════════
# 汇总发布 (手动触发)
# ═══════════════════════════════════════════
release:
  stage: release
  image: ubuntu:22.04
  when: manual  # 手动确认发布
  dependencies:
    - build-linux-x86_64
    - build-linux-arm64
    - build-windows
  script:
    - ls -la artifacts/
    - echo "准备发布..."
    # 这里可以添加 Gitee Release API 调用
    # 或者手动下载 artifacts 后在 Gitee 页面创建 Release
