<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 12px; font-family: system-ui; font-size: 13px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    .row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    input { width: 80px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-save { background: #4f8ef7; color: #fff; }
    .btn-save:hover { background: #3a7be0; }
    .status { font-size: 11px; color: #666; }
    .connected { color: #22a55b; }
    .disconnected { color: #e53935; }
  </style>
</head>
<body>
  <h3>WebBridge 设置</h3>
  <div class="row">
    <label>端口:</label>
    <input type="number" id="port" min="1024" max="65535">
    <button class="btn-save" id="save">保存</button>
  </div>
  <div class="status" id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
