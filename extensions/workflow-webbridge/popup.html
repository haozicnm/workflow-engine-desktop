<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .status {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .label { color: #8892b0; }
    .value { color: #64ffda; font-weight: 500; }
    .value.error { color: #ff6b6b; }
    .tools {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px;
    }
    .tools h2 { font-size: 12px; color: #8892b0; margin-bottom: 8px; }
    .tool-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tool-tag {
      background: #0f3460;
      color: #64ffda;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon/48.png" alt="icon">
    <h1>Workflow WebBridge</h1>
  </div>
  
  <div class="status">
    <div class="status-row">
      <span class="label">状态</span>
      <span class="value" id="status">检查中...</span>
    </div>
    <div class="status-row">
      <span class="label">HTTP 端口</span>
      <span class="value" id="port">19527</span>
    </div>
    <div class="status-row">
      <span class="label">已连接标签页</span>
      <span class="value" id="tabs">0</span>
    </div>
  </div>
  
  <div class="tools">
    <h2>可用工具</h2>
    <div class="tool-list">
      <span class="tool-tag">snapshot</span>
      <span class="tool-tag">click</span>
      <span class="tool-tag">fill</span>
      <span class="tool-tag">evaluate</span>
      <span class="tool-tag">navigate</span>
      <span class="tool-tag">screenshot</span>
      <span class="tool-tag">mouse_click</span>
      <span class="tool-tag">key_type</span>
      <span class="tool-tag">send_keys</span>
      <span class="tool-tag">upload</span>
      <span class="tool-tag">cdp</span>
      <span class="tool-tag">download</span>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
