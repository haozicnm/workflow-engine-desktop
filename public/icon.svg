<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Connecting lines -->
  <path d="M180 250 L260 140" stroke="url(#g1)" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <path d="M290 150 L370 260" stroke="url(#g1)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M370 260 L290 370" stroke="url(#g2)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M260 380 L180 250" stroke="url(#g2)" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- Node 1 (top) — input -->
  <circle cx="260" cy="140" r="45" fill="#0d1117" stroke="url(#g1)" stroke-width="6"/>
  <path d="M250 140 L260 125 L270 140 L260 155 Z" fill="url(#g1)" transform="rotate(-90 260 140)"/>

  <!-- Node 2 (right) — process -->
  <circle cx="370" cy="260" r="45" fill="#0d1117" stroke="url(#g2)" stroke-width="6"/>
  <rect x="348" y="238" width="44" height="44" rx="8" fill="url(#g2)" opacity="0.3"/>
  <circle cx="370" cy="248" r="6" fill="url(#g2)"/>
  <circle cx="370" cy="260" r="6" fill="url(#g2)"/>
  <circle cx="370" cy="272" r="6" fill="url(#g2)"/>

  <!-- Node 3 (bottom) — output -->
  <circle cx="290" cy="370" r="45" fill="#0d1117" stroke="url(#g3)" stroke-width="6"/>
  <path d="M270 370 L290 355 L310 370 L290 385 Z" fill="url(#g3)"/>

  <!-- Node 4 (left) — data -->
  <circle cx="180" cy="250" r="45" fill="#0d1117" stroke="url(#g1)" stroke-width="6"/>
  <rect x="162" y="234" width="36" height="32" rx="4" fill="url(#g1)" opacity="0.25"/>
  <rect x="166" y="238" width="28" height="6" rx="2" fill="url(#g1)"/>
  <rect x="166" y="248" width="20" height="6" rx="2" fill="url(#g1)"/>
  <rect x="166" y="256" width="24" height="6" rx="2" fill="url(#g1)"/>
</svg>
