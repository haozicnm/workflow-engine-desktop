<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#gear)" stroke-width="28" opacity="0.3"/>

  <!-- Gear teeth (16 teeth) -->
  <g fill="url(#gear)" filter="url(#glow)">
    <!-- Tooth 0 -->
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(0 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(22.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(45 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(67.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(90 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(112.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(135 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(157.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(180 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(202.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(225 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(247.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(270 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(292.5 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(315 512 512)"/>
    <rect x="480" y="64" width="64" height="80" rx="8" transform="rotate(337.5 512 512)"/>
  </g>

  <!-- Gear body (circle with spokes cutout) -->
  <circle cx="512" cy="512" r="340" fill="url(#gear)" filter="url(#glow)"/>

  <!-- Center cutout -->
  <circle cx="512" cy="512" r="170" fill="url(#bg)"/>

  <!-- Inner hub -->
  <circle cx="512" cy="512" r="110" fill="url(#gear)" filter="url(#glow)"/>

  <!-- Center hole -->
  <circle cx="512" cy="512" r="40" fill="url(#bg)"/>
</svg>
