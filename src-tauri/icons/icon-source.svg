<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <!-- 蓝色渐变 — 核心 -->
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <!-- 青绿渐变 — 流动 -->
    <linearGradient id="teal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#1a7f37"/>
    </linearGradient>
    <!-- 琥珀渐变 — 输出 -->
    <linearGradient id="amber" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3b341"/>
      <stop offset="100%" stop-color="#9e6a03"/>
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)" stroke="#21262d" stroke-width="3"/>

  <!-- ====== 三个工作流节点 ====== -->

  <!-- 节点 1：左上 — 六边形 -->
  <g transform="translate(310, 310)" filter="url(#glow)">
    <polygon points="0,-130 113,-65 113,65 0,130 -113,65 -113,-65"
             fill="#0d1117" stroke="url(#blue)" stroke-width="5"/>
    <!-- 内部箭头符号 -->
    <polygon points="-25,-25 25,0 -25,25" fill="url(#blue)" opacity="0.8"/>
    <line x1="-40" y1="0" x2="-15" y2="0" stroke="#58a6ff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 节点 2：右上 — 菱形/齿轮 -->
  <g transform="translate(714, 310)" filter="url(#glow)">
    <rect x="-95" y="-95" width="190" height="190" rx="30" transform="rotate(22.5 0 0)"
          fill="#0d1117" stroke="url(#teal)" stroke-width="5"/>
    <!-- 齿轮齿 -->
    <rect x="-95" y="-95" width="190" height="190" rx="30" transform="rotate(45 0 0)"
          fill="none" stroke="url(#teal)" stroke-width="5" opacity="0.3"/>
    <!-- 中心播放按钮 -->
    <polygon points="-20,-30 35,0 -20,30" fill="url(#teal)" opacity="0.85"/>
  </g>

  <!-- 节点 3：底部中心 — 圆形输出 -->
  <g transform="translate(512, 690)" filter="url(#glow)">
    <circle r="110" fill="#0d1117" stroke="url(#amber)" stroke-width="5"/>
    <circle r="70" fill="none" stroke="url(#amber)" stroke-width="2" opacity="0.4"/>
    <!-- 对勾 -->
    <polyline points="-40,0 -15,28 40,-30"
              fill="none" stroke="url(#amber)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ====== 连接线 ====== -->

  <!-- 节点1 → 节点2：弯曲箭头 -->
  <path d="M410,340 Q560,240 640,300"
        fill="none" stroke="url(#blue)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <polygon points="625,285 655,295 640,310" fill="#58a6ff" opacity="0.7"/>

  <!-- 节点1 → 中心：连线 -->
  <path d="M340,420 Q400,540 470,610"
        fill="none" stroke="url(#blue)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- 节点2 → 中心：连线 -->
  <path d="M680,420 Q620,540 540,610"
        fill="none" stroke="url(#teal)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- ====== 中心引擎 ====== -->
  <g transform="translate(512, 475)" filter="url(#softGlow)">
    <!-- 外圈齿轮 -->
    <circle r="90" fill="#0d1117" stroke="url(#blue)" stroke-width="4"/>
    <circle r="72" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
    <!-- 闪电符号 -->
    <polygon points="-5,-55 15,-10 0,-10 15,55 -5,15 10,15"
             fill="url(#blue)" opacity="0.9"/>
  </g>

  <!-- ====== 装饰：外圈粒子 ====== -->
  <circle cx="512" cy="475" r="220" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="3 30" opacity="0.4"/>
  <circle cx="512" cy="475" r="280" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="2 50" opacity="0.25"/>

</svg>
