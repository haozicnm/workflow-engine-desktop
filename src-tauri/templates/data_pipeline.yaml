meta:
  name: "数据管道"
  desc: "获取数据 → 处理 → 存储的完整管道"
  tags: [pipeline, etl, data, automation]
  category: "data"
params:
  - name: source_url
    desc: "数据源 URL"
    required: true
  - name: output_path
    desc: "输出文件路径"
    required: true
workflow:
  version: "1.0"
  name: "数据管道"
  meta:
    author: "template"
    tags: [pipeline, etl]
  steps:
    - id: fetch
      type: http
      name: "获取数据"
      config:
        method: "GET"
        url: "{{source_url}}"
    - id: process
      type: script
      name: "处理数据"
      config:
        script: "step_fetch.body"
      run_condition:
        ref: fetch
        when: "true"
