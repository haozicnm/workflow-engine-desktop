# 工作流模板库 — 索引
# 每个模板是一个独立的 .wf.json 文件

[[templates]]
name = "daily-monitor"
version = "1.0.0"
description = "每日全栈舆情监控 — HTTP API 数据采集 + Excel 报表 + 通知"
params = ["hn_api", "github_api", "output_dir"]
schedule = "0 0 9 * * * *"   # 每天 9:00
category = "monitoring"
file = "monitoring/daily-monitor.wf.json"

[[templates]]
name = "file-batch-approval"
version = "1.0.0"
description = "批量文件处理 + 人工审批流水线"
params = ["data_dir", "file_pattern", "approval_timeout_ms"]
schedule = ""
category = "batch"
file = "batch/file-batch-approval.wf.json"

[[templates]]
name = "integration-smoke"
version = "1.0.0"
description = "嵌套容错链冒烟测试 — runCondition + retry + loop + 变量引用全链路"
params = ["test_dir", "items_list", "delay_ms"]
schedule = ""
category = "stress"
file = "stress/integration-smoke.wf.json"

[[templates]]
name = "http-approval-pipeline"
version = "1.0.0"
description = "HTTP 数据审批管道 — 获取数据 → 人工审批(超时自动拒绝) → 分支处理"
params = ["api_url", "approval_timeout_ms", "notify_title"]
schedule = ""
category = "batch"
file = "batch/http-approval-pipeline.wf.json"

[[templates]]
name = "web-monitor-alert"
version = "1.0.0"
description = "网页监控告警 — 浏览器抓取 → Rhai 脚本分析 → 条件判断 → 异常通知"
params = ["target_url", "alert_threshold", "notify_title"]
schedule = ""
category = "monitoring"
file = "monitoring/web-monitor-alert.wf.json"

[[templates]]
name = "my-test"
version = "1.0.0"
description = "嵌套容错链压力测试"
params = ["test_dir", "items"]
schedule = ""
category = "general"
file = "general/my-test.wf.json"
