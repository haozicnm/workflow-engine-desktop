# ═══════════════════════════════════════════════════════
# 工作流模板：网页抓取 → Excel 输出
# ═══════════════════════════════════════════════════════
#
# 流程：
#   1. 用 web_scrape 节点抓取网页列表数据
#   2. 用 script 节点组装表头 + 数据
#   3. 写入 Excel 文件
#   4. 完成通知
#
# 适用场景：抓取商品列表、新闻列表、搜索结果等

name: 网页抓取→Excel
description: 声明式抓取网页列表数据 → 整理格式 → 写入 Excel 文件
version: "1.1"

variables:
  target_url: https://news.ycombinator.com
  output_path: ./output/scraped_data.xlsx

steps:
  - id: scrape
    name: 抓取网页数据
    type: web_scrape
    config:
      url: "{{target_url}}"
      wait_for: ".athing"
      extract:
        - selector: ".athing"
          fields:
            title: ".titleline a"
            link: ".titleline a[href]"
            site: ".sitestr"
      delay_ms: 1000
      headless: true

  - id: assemble
    name: 组装表格数据
    type: script
    config:
      script: |
        let headers = [["标题", "链接", "来源"]];
        let rows = [];
        for item in step_scrape.items {
          rows.push([item.title, item.link, item.site]);
        }
        headers + rows

  - id: write_excel
    name: 写入Excel
    type: excel
    config:
      action: write
      path: "{{output_path}}"
      sheet: "抓取结果"
      data: "{{step_assemble}}"

  - id: notify
    name: 完成通知
    type: notify
    config:
      notify_type: system
      title: 抓取完成
      body: "共抓取 {{step_scrape.total_items}} 条数据，已保存到 {{output_path}}"
