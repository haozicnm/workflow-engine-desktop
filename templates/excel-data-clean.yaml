# ═══════════════════════════════════════════════════════
# 工作流模板：Excel 数据清洗
# ═══════════════════════════════════════════════════════
#
# 流程：
#   1. 读取原始 Excel
#   2. 用脚本清洗/过滤/转换数据
#   3. 生成汇总报表
#   4. 写入新 Excel
#
# 适用场景：数据清洗、报表生成、数据分析

name: Excel数据清洗
description: 读取 Excel → 脚本清洗过滤 → 生成汇总 → 写入新文件
version: "1.1"

variables:
  input_path: ./data/raw_data.xlsx
  output_path: ./output/cleaned_data.xlsx

steps:
  - id: read_raw
    name: 读取原始数据
    type: excel
    config:
      action: read
      path: "{{input_path}}"
      sheet: Sheet1

  - id: clean_data
    name: 数据清洗
    type: script
    config:
      script: |
        let data = step_read_raw;
        let headers = data.headers;
        let rows = data.rows;
        let cleaned = [];
        let removed = 0;

        for row in rows {
          // 跳过空行
          let is_empty = true;
          for cell in row {
            if cell != "" && cell != null {
              is_empty = false;
              break;
            }
          }
          if is_empty {
            removed += 1;
            continue;
          }
          cleaned.push(row);
        }

        #{
          "headers": headers,
          "rows": cleaned,
          "original_count": rows.len(),
          "cleaned_count": cleaned.len(),
          "removed_count": removed
        }

  - id: assemble_report
    name: 组装报表
    type: script
    config:
      script: |
        let result = step_clean_data;
        let report = [];

        // 表头
        report.push(result.headers);

        // 数据行
        for row in result.rows {
          report.push(row);
        }

        // 汇总行
        report.push([]);
        report.push(["=== 汇总 ==="]);
        report.push(["原始行数", result.original_count]);
        report.push(["清洗后行数", result.cleaned_count]);
        report.push(["删除行数", result.removed_count]);

        report

  - id: write_excel
    name: 写入清洗结果
    type: excel
    config:
      action: write
      path: "{{output_path}}"
      sheet: "清洗结果"
      data: "{{step_assemble_report}}"

  - id: notify
    name: 完成通知
    type: notify
    config:
      notify_type: system
      title: 数据清洗完成
      body: "原始 {{step_clean_data.original_count}} 行 → 清洗后 {{step_clean_data.cleaned_count}} 行，删除 {{step_clean_data.removed_count}} 行"
