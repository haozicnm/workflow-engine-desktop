# ═══════════════════════════════════════════════════════
# 工作流模板：While 循环 — Excel 逐行读取→浏览器填写
# ═══════════════════════════════════════════════════════
#
# 流程：
#   1. 读取 Excel A 列全部数据（数组）
#   2. While 循环：逐行判断，有数据就执行，无数据就停
#   3. 每轮从数组取当前行 → 写入浏览器输入框 → 提交
#   4. 循环结束后通知
#
# 适用场景：批量表单填写、逐条数据处理、数据录入
# 核心区别：for-each 循环（loop）遍历已知数组，while 循环根据条件动态停止

name: While循环-逐行读取→浏览器填写
description: Excel A列 → while 循环逐行读取 → 填入浏览器 → 无数据自动停止
version: "1.1"

variables:
  excel_path: ./data/input.xlsx
  form_url: https://example.com/form

steps:
  # ─── 步骤 1：读取 A 列全部数据 ───
  - id: step_read
    name: 读取A列
    type: excel
    config:
      action: extract_column
      path: "{{excel_path}}"
      sheet: Sheet1
      column: A

  # ─── 步骤 2：While 循环处理 ───
  # items: 数据源数组
  # condition.op: not_empty → 当前元素不为空就继续，为空就停
  # __item / __current = 当前元素（即当前行的值）
  # __index = 当前索引（从 0 开始）
  # __index1 = 当前索引（从 1 开始）
  - id: step_loop
    name: 逐行处理
    type: while
    config:
      items: "step_read"
      condition:
        op: not_empty
      max_iterations: 1000
      body:
        - id: step_open
          name: 打开表单页
          type: browser
          config:
            action: navigate
            url: "{{form_url}}"

        - id: step_wait
          name: 等待表单加载
          type: browser
          config:
            action: wait
            selector: "#input"

        - id: step_fill
          name: 填入当前值
          type: browser
          config:
            action: fill
            selector: "#input"
            value: "{{__current}}"

        - id: step_submit
          name: 提交
          type: browser
          config:
            action: click
            selector: "#submit"
            wait_ms: 1000

  # ─── 步骤 3：完成通知 ───
  - id: step_notify
    name: 完成通知
    type: notify
    config:
      notify_type: system
      title: 处理完成
      body: "共处理 {{step_loop.count}} 行数据"
