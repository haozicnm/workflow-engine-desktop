name: Release Build

# 手动触发 + 推送 tag 触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ═══════════════════════════════════════════
  # ARM64 deb + tar.gz
  # ═══════════════════════════════════════════
  build-arm64:
    name: ARM64 Linux (deb + tar.gz)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: arm64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: arm64-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        working-directory: src-tauri
        run: cargo build --release --bin workflow-engine --bin wf-cli

      - name: Package deb
        run: |
          set -ex
          VERSION=${GITHUB_REF_NAME#v}
          DEB_ARCH=arm64
          echo "=== Packaging deb v${VERSION} for ${DEB_ARCH} ==="
          ls src-tauri/target/release/workflow-engine src-tauri/target/release/wf-cli
          ls -d dist/ src-tauri/sidecars/ debian/
          mkdir -p pkg/opt/workflow-engine pkg/usr/lib/systemd/user pkg/DEBIAN
          cp src-tauri/target/release/workflow-engine pkg/opt/workflow-engine/
          cp src-tauri/target/release/wf-cli pkg/opt/workflow-engine/
          cp -r dist pkg/opt/workflow-engine/
          cp -r src-tauri/sidecars pkg/opt/workflow-engine/
          cp src-tauri/node-schema.json pkg/opt/workflow-engine/
          if [ -f debian/wf-engine.service ]; then
            cp debian/wf-engine.service pkg/usr/lib/systemd/user/
          fi
          if [ -f debian/postinst ]; then
            cp debian/postinst pkg/DEBIAN/
            chmod 755 pkg/DEBIAN/postinst
          fi
          # 动态生成 DEBIAN/control（修正版本和架构）
          sed -e "s/^Version:.*/Version: ${VERSION}/" \
              -e "s/^Architecture:.*/Architecture: ${DEB_ARCH}/" \
              debian/control > pkg/DEBIAN/control
          cat pkg/DEBIAN/control
          mkdir -p pkg/opt/workflow-engine/data/logs
          dpkg-deb --build pkg workflow-engine_${VERSION}_${DEB_ARCH}.deb

      - name: Package tar.gz (standalone)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARGZ=workflow-engine-${VERSION}-linux-arm64.tar.gz
          mkdir -p /tmp/wf-pkg
          cp src-tauri/target/release/workflow-engine /tmp/wf-pkg/
          cp src-tauri/target/release/wf-cli /tmp/wf-pkg/
          cp -r dist /tmp/wf-pkg/
          cp -r src-tauri/sidecars /tmp/wf-pkg/
          cp src-tauri/node-schema.json /tmp/wf-pkg/
          tar czf $TARGZ -C /tmp/wf-pkg .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-deb
          path: workflow-engine_*_arm64.deb

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-tarball
          path: workflow-engine-*-linux-arm64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            workflow-engine_*_arm64.deb
            workflow-engine-*-linux-arm64.tar.gz

  # ═══════════════════════════════════════════
  # x86_64 deb + tar.gz
  # ═══════════════════════════════════════════
  build-x64:
    name: x86_64 Linux (deb + tar.gz)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: x64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: x64-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        working-directory: src-tauri
        run: cargo build --release --bin workflow-engine --bin wf-cli

      - name: Package deb
        run: |
          set -ex
          VERSION=${GITHUB_REF_NAME#v}
          DEB_ARCH=amd64
          echo "=== Packaging deb v${VERSION} for ${DEB_ARCH} ==="
          ls src-tauri/target/release/workflow-engine src-tauri/target/release/wf-cli
          ls -d dist/ src-tauri/sidecars/ debian/
          mkdir -p pkg/opt/workflow-engine pkg/usr/lib/systemd/user pkg/DEBIAN
          cp src-tauri/target/release/workflow-engine pkg/opt/workflow-engine/
          cp src-tauri/target/release/wf-cli pkg/opt/workflow-engine/
          cp -r dist pkg/opt/workflow-engine/
          cp -r src-tauri/sidecars pkg/opt/workflow-engine/
          cp src-tauri/node-schema.json pkg/opt/workflow-engine/
          if [ -f debian/wf-engine.service ]; then
            cp debian/wf-engine.service pkg/usr/lib/systemd/user/
          fi
          if [ -f debian/postinst ]; then
            cp debian/postinst pkg/DEBIAN/
            chmod 755 pkg/DEBIAN/postinst
          fi
          # 动态生成 DEBIAN/control（修正版本和架构）
          sed -e "s/^Version:.*/Version: ${VERSION}/" \
              -e "s/^Architecture:.*/Architecture: ${DEB_ARCH}/" \
              debian/control > pkg/DEBIAN/control
          mkdir -p pkg/opt/workflow-engine/data/logs
          dpkg-deb --build pkg workflow-engine_${VERSION}_${DEB_ARCH}.deb

      - name: Package tar.gz (standalone)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARGZ=workflow-engine-${VERSION}-linux-x64.tar.gz
          mkdir -p /tmp/wf-pkg
          cp src-tauri/target/release/workflow-engine /tmp/wf-pkg/
          cp src-tauri/target/release/wf-cli /tmp/wf-pkg/
          cp -r dist /tmp/wf-pkg/
          cp -r src-tauri/sidecars /tmp/wf-pkg/
          cp src-tauri/node-schema.json /tmp/wf-pkg/
          tar czf $TARGZ -C /tmp/wf-pkg .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-deb
          path: workflow-engine_*_amd64.deb

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-tarball
          path: workflow-engine-*-linux-x64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            workflow-engine_*_amd64.deb
            workflow-engine-*-linux-x64.tar.gz

  # ═══════════════════════════════════════════
  # Windows zip (standalone)
  # ═══════════════════════════════════════════
  build-windows:
    name: Windows (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: win-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: win-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        working-directory: src-tauri
        run: cargo build --release --bin workflow-engine --bin wf-cli

      - name: Create python-runtime placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/wheels
          Set-Content -Path src-tauri/python-runtime/wheels/.gitkeep -Value "placeholder"
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/playwright-browsers
          Set-Content -Path src-tauri/python-runtime/playwright-browsers/.gitkeep -Value "placeholder"

      - name: Package zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "=== Packaging zip for Windows ==="
          Get-ChildItem src-tauri/target/release/*.exe | ForEach-Object { Write-Host $_.FullName }
          Test-Path dist
          $version = "${{ github.ref_name }}" -replace '^v','' 
          $pkgDir = "workflow-engine-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $pkgDir
          Copy-Item src-tauri/target/release/workflow-engine.exe $pkgDir/
          Copy-Item src-tauri/target/release/wf-cli.exe $pkgDir/
          Copy-Item -Recurse dist $pkgDir/
          Copy-Item -Recurse src-tauri/sidecars $pkgDir/sidecars
          Copy-Item src-tauri/node-schema.json $pkgDir/
          Copy-Item -Recurse src-tauri/python-runtime $pkgDir/python-runtime
          $lines = @(
            '@echo off'
            'title Workflow Engine'
            'cd /d "%~dp0"'
            'start /MIN "" "workflow-engine.exe"'
            'echo Waiting for Workflow Engine to start...'
            ':wait'
            'ping 127.0.0.1 -n 2 > nul'
            'curl -s http://localhost:19529/api/health >nul 2>&1'
            'if errorlevel 1 goto wait'
            'echo Workflow Engine started on http://localhost:19529'
            'start http://localhost:19529'
          )
          $lines | Set-Content -Path "$pkgDir/start.bat" -Encoding ASCII
          Compress-Archive -Path $pkgDir -DestinationPath "workflow-engine-$version-windows-x64.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-zip
          path: workflow-engine-*-windows-x64.zip

      - name: Build Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.ref_name }}" -replace '^v',''
          Write-Host "=== Building Windows installer v${version} ==="
          
          # Reuse the zip package dir as the installer source
          $pkgDir = "workflow-engine-$version-windows-x64"
          if (-not (Test-Path $pkgDir)) {
            Write-Error "Package directory not found: $pkgDir"
            exit 1
          }
          
          # Create install.ps1 (one-click installer)
          @'
          $ErrorActionPreference = "Stop"
          $installDir = "$env:ProgramFiles\Workflow Engine"
          Write-Host "Installing Workflow Engine to $installDir..."
          
          # Stop existing
          Get-Process workflow-engine -ErrorAction SilentlyContinue | Stop-Process -Force
          
          # Copy files
          $srcDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
          Copy-Item -Recurse "$srcDir\*" $installDir -Exclude "install.ps1","uninstall.ps1"
          
          # Start menu shortcut
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$env:ProgramData\Microsoft\Windows\Start Menu\Programs\Workflow Engine.lnk")
          $Shortcut.TargetPath = "$installDir\start.bat"
          $Shortcut.WorkingDirectory = $installDir
          $Shortcut.Save()
          
          Write-Host "Installation complete! Starting Workflow Engine..."
          Start-Process "$installDir\start.bat"
          '@ | Set-Content -Path "$pkgDir/install.ps1" -Encoding UTF8
          
          # Create uninstall.ps1
          @'
          $ErrorActionPreference = "Stop"
          Write-Host "Uninstalling Workflow Engine..."
          Get-Process workflow-engine -ErrorAction SilentlyContinue | Stop-Process -Force
          Remove-Item -Recurse -Force "$env:ProgramFiles\Workflow Engine" -ErrorAction SilentlyContinue
          Remove-Item "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\Workflow Engine.lnk" -ErrorAction SilentlyContinue
          Write-Host "Uninstall complete."
          '@ | Set-Content -Path "$pkgDir/uninstall.ps1" -Encoding UTF8
          
          # Create setup.bat (double-click installer entry point)
          @'
          @echo off
          echo ============================================
          echo   Workflow Engine v%VERSION% Installer
          echo ============================================
          echo.
          echo This will install Workflow Engine to:
          echo   %ProgramFiles%\Workflow Engine
          echo.
          echo Press any key to install, or close this window to cancel.
          pause >nul
          powershell -ExecutionPolicy Bypass -File "%~dp0install.ps1"
          '@ -replace '%VERSION%', $version | Set-Content -Path "$pkgDir/setup.bat" -Encoding ASCII
          
          # Package as self-extracting installer (zip renamed to indicate it's installable)
          $installerZip = "WorkflowEngine-$version-windows-x64-setup.zip"
          Compress-Archive -Path $pkgDir -DestinationPath $installerZip -Force
          Write-Host "Installer created: $installerZip"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-installer
          path: WorkflowEngine-*-windows-x64-setup.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            workflow-engine-*-windows-x64.zip
            WorkflowEngine-*-windows-x64-setup.zip
