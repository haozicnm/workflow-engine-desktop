name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ═══ Windows 构建 (Full) ═══
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 50
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: src
        run: npm ci

      - name: Build frontend
        working-directory: src
        run: npm run build

      - name: Create python-runtime directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/wheels
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/playwright-browsers

      # ─── Download latest Playwright Chromium ───
      - name: Download Playwright Chromium (latest)
        shell: pwsh
        run: |
          # Get latest Chromium revision from Playwright
          $rev = (Invoke-RestMethod -Uri "https://registry.npmjs.org/playwright-core/latest").version
          Write-Host "Playwright version: $rev"
          # Download browser manifests to find Chromium revision
          npm install playwright-core@$rev --no-save 2>$null
          $browserJson = Get-Content "node_modules/playwright-core/browsers.json" -Raw | ConvertFrom-Json
          $chromium = $browserJson.browsers | Where-Object { $_.name -eq "chromium" } | Select-Object -First 1
          $chromiumRev = $chromium.revision
          Write-Host "Chromium revision: $chromiumRev"
          # Download from Playwright CDN with retry
          $dest = "${{ github.workspace }}/src-tauri/python-runtime/playwright-browsers/chromium-$chromiumRev"
          New-Item -ItemType Directory -Force -Path $dest
          $zip = "${{ runner.temp }}/chromium-win64.zip"
          $url = "https://playwright.azureedge.net/builds/chromium/$chromiumRev/chromium-win64.zip"
          $maxRetries = 3
          for ($i = 0; $i -lt $maxRetries; $i++) {
            try {
              Write-Host "Downloading Chromium (attempt $($i+1)/$maxRetries)..."
              Invoke-WebRequest -Uri $url -OutFile $zip -ErrorAction Stop -TimeoutSec 120
              break
            } catch {
              Write-Host "Download failed: $_"
              if ($i -lt $maxRetries - 1) {
                Write-Host "Retrying in 15s..."
                Start-Sleep -Seconds 15
              } else {
                throw
              }
            }
          }
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Get-ChildItem $dest -Recurse -Name | Select-Object -First 5
        timeout-minutes: 5

      # ─── Download playwright wheels (offline install) ───
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download playwright wheels
        run: |
          pip download playwright --dest src-tauri/python-runtime/wheels
          Write-Host "Wheels downloaded:"
          Get-ChildItem src-tauri/python-runtime/wheels

      # ─── Build ───
      - name: Build Tauri (Windows)
        run: npx --prefix src tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ═══ Linux 构建 (AppImage) ═══
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: src
        run: npm ci

      - name: Build frontend
        working-directory: src
        run: npm run build

      - name: Create python-runtime directories
        run: mkdir -p src-tauri/python-runtime/wheels src-tauri/python-runtime/playwright-browsers

      # ─── Setup Python & download playwright + Chromium ───
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download playwright wheels
        run: |
          pip download playwright --dest src-tauri/python-runtime/wheels
          ls -la src-tauri/python-runtime/wheels/

      - name: Download Playwright Chromium
        run: |
          pip install playwright
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/src-tauri/python-runtime/playwright-browsers"
          python -m playwright install chromium
          ls -la "$PLAYWRIGHT_BROWSERS_PATH/"

      # ─── Build ───
      - name: Build Tauri (Linux AppImage)
        run: npx --prefix src tauri build --bundles appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ═══ 创建 Release ═══
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Workflow Engine Desktop ${{ github.ref_name }}"
          body: |
            ## Workflow Engine Desktop ${{ github.ref_name }}

            ### 🪟 Windows
            - **Full 安装包** (.exe) — 离线版，内置 Playwright Chromium + pip wheels

            ### 🐧 Linux
            - **Full AppImage** — 内置 Playwright Chromium + pip wheels

            ### 系统要求
            - Windows 10+
            - Ubuntu 22.04+ (或其他支持 AppImage 的发行版)

            ### 内置内容
            - Playwright Chromium（最新稳定版）
            - playwright pip 离线安装包（自动安装到系统 Python）

            ### 变更
            详见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/windows-nsis/*.exe
            artifacts/linux-appimage/*.AppImage
          draft: false
          prerelease: false

