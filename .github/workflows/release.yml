# GitHub Actions — 手动触发构建三平台安装包
# 触发方式：GitHub 页面手动运行 workflow_dispatch
# 产出：x86_64 Linux / ARM64 Linux / Windows 安装包

name: Build Release (手动触发)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v6.6.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '18'

jobs:
  # ═══════════════════════════════════════════
  # Job 1: 构建 x86_64 Linux
  # ═══════════════════════════════════════════
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev \
            libjavascriptcoregtk-4.0-dev

      - name: Build frontend
        run: |
          cd src
          npm ci
          npm run build

      - name: Build Tauri (x86_64)
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: src-tauri/target/release/bundle/deb/*.deb

  # ═══════════════════════════════════════════
  # Job 2: 构建 ARM64 Linux (交叉编译)
  # ═══════════════════════════════════════════
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            patchelf

      - name: Configure cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-L", "/usr/aarch64-linux-gnu/lib"]
          EOF

      - name: Build frontend
        run: |
          cd src
          npm ci
          npm run build

      - name: Build Tauri (ARM64)
        run: cargo tauri build --target aarch64-unknown-linux-gnu
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb

  # ═══════════════════════════════════════════
  # Job 3: 构建 Windows
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build frontend
        run: |
          cd src
          npm ci
          npm run build

      - name: Build Tauri (Windows)
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ═══════════════════════════════════════════
  # Job 4: 汇总发布
  # ═══════════════════════════════════════════
  release:
    needs: [build-linux-x86_64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.event.inputs.version, 'v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Workflow Engine ${{ github.event.inputs.version }}
          body: |
            ## Workflow Engine ${{ github.event.inputs.version }}

            ### 安装包
            - **Windows x86_64**: `Workflow Engine_*_x64-setup.exe`
            - **Linux x86_64**: `workflow-engine_*_amd64.deb`
            - **Linux ARM64**: `workflow-engine_*_arm64.deb` (鲲鹏/飞腾)

            ### 说明
            手动触发构建，版本稳定后发布。
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
