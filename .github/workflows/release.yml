name: Release Build

# 手动触发 + 推送 tag 触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ═══════════════════════════════════════════
  # ARM64 AppImage + deb
  # ═══════════════════════════════════════════
  build-arm64:
    name: ARM64 Linux (AppImage + deb)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: arm64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: arm64-${{ runner.os }}-

      - name: Install system deps (Tauri + WebKit2GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (AppImage + deb)
        run: |
          npx tauri build --bundles appimage,deb
        env:
          CI: true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ═══════════════════════════════════════════
  # x86_64 AppImage + deb
  # ═══════════════════════════════════════════
  build-x64:
    name: x86_64 Linux (AppImage + deb)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: x64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: x64-${{ runner.os }}-

      - name: Install system deps (Tauri + WebKit2GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (AppImage + deb)
        run: |
          npx tauri build --bundles appimage,deb
        env:
          CI: true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ═══════════════════════════════════════════
  # Windows NSIS
  # ═══════════════════════════════════════════
  build-windows:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: win-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: win-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (NSIS)
        run: |
          npx tauri build --bundles nsis
        env:
          CI: true

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
