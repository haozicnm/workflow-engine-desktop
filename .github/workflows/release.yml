name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: src
        run: npm ci

      - name: Build frontend
        working-directory: src
        run: npm run build

      - name: Create python-runtime placeholder
        run: New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/embed; Set-Content -Path src-tauri/python-runtime/embed/.gitkeep -Value "placeholder"

      - name: Build Tauri (Windows)
        run: npx --prefix src tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Find installer files
        id: find
        shell: bash
        run: |
          NSIS=$(ls src-tauri/target/release/bundle/nsis/*.exe 2>/dev/null | head -1)
          MSI=$(ls src-tauri/target/release/bundle/msi/*.msi 2>/dev/null | head -1)
          echo "nsis=$NSIS" >> $GITHUB_OUTPUT
          echo "msi=$MSI" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Workflow Engine Desktop ${{ github.ref_name }}"
          body: |
            ## Workflow Engine Desktop ${{ github.ref_name }}

            自动构建的 Windows 安装包。

            ### 下载
            - **NSIS 安装包** (.exe) — 标准 Windows 安装程序
            - **MSI 安装包** (.msi) — 企业批量部署

            ### 变更
            详见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            ${{ steps.find.outputs.nsis }}
            ${{ steps.find.outputs.msi }}
          draft: false
          prerelease: false
