name: Release Build

# 手动触发 + 推送 tag 触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # ═══════════════════════════════════════════
  # ARM64 deb + tar.gz
  # ═══════════════════════════════════════════
  build-arm64:
    name: ARM64 Linux (deb + tar.gz)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: arm64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: arm64-${{ runner.os }}-

      - name: Install system deps (Tauri + WebKit2GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (deb)
        run: |
          npx tauri build --bundles deb
        env:
          CI: true

      - name: Package tar.gz (standalone)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARGZ=workflow-engine-${VERSION}-linux-arm64.tar.gz
          mkdir -p /tmp/wf-pkg
          cp src-tauri/target/release/workflow-engine /tmp/wf-pkg/
          cp src-tauri/target/release/wf-cli /tmp/wf-pkg/
          cp -r dist /tmp/wf-pkg/
          cp -r src-tauri/sidecars /tmp/wf-pkg/
          cp node-schema.json /tmp/wf-pkg/
          tar czf $TARGZ -C /tmp/wf-pkg .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-tarball
          path: workflow-engine-*-linux-arm64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            workflow-engine-*-linux-arm64.tar.gz

  # ═══════════════════════════════════════════
  # x86_64 deb + tar.gz
  # ═══════════════════════════════════════════
  build-x64:
    name: x86_64 Linux (deb + tar.gz)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: x64-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: x64-${{ runner.os }}-

      - name: Install system deps (Tauri + WebKit2GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (deb)
        run: |
          npx tauri build --bundles deb
        env:
          CI: true

      - name: Package tar.gz (standalone)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARGZ=workflow-engine-${VERSION}-linux-x64.tar.gz
          mkdir -p /tmp/wf-pkg
          cp src-tauri/target/release/workflow-engine /tmp/wf-pkg/
          cp src-tauri/target/release/wf-cli /tmp/wf-pkg/
          cp -r dist /tmp/wf-pkg/
          cp -r src-tauri/sidecars /tmp/wf-pkg/
          cp node-schema.json /tmp/wf-pkg/
          tar czf $TARGZ -C /tmp/wf-pkg .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-x64-tarball
          path: workflow-engine-*-linux-x64.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            workflow-engine-*-linux-x64.tar.gz

  # ═══════════════════════════════════════════
  # Windows NSIS + zip
  # ═══════════════════════════════════════════
  build-windows:
    name: Windows (NSIS + zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust & Node
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            node_modules
          key: win-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'package-lock.json') }}
          restore-keys: win-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build & bundle (NSIS)
        run: |
          npx tauri build --bundles nsis
        env:
          CI: true

      - name: Package zip (standalone)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $pkgDir = "workflow-engine-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $pkgDir
          Copy-Item src-tauri/target/release/workflow-engine.exe $pkgDir/
          Copy-Item src-tauri/target/release/wf-cli.exe $pkgDir/
          Copy-Item -Recurse dist $pkgDir/
          Copy-Item -Recurse src-tauri/sidecars $pkgDir/sidecars
          Copy-Item node-schema.json $pkgDir/
          $lines = @(
            'echo off'
            'title Workflow Engine'
            'cd /d "%~dp0"'
            'start /MIN "" "workflow-engine.exe"'
            'echo Workflow Engine started on http://localhost:19528'
            'ping 127.0.0.1 -n 4 > nul'
            'start http://localhost:19528'
          )
          $lines | Set-Content -Path "$pkgDir/start.bat" -Encoding ASCII
          Compress-Archive -Path $pkgDir -DestinationPath "workflow-engine-$version-windows-x64.zip"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-zip
          path: workflow-engine-*-windows-x64.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            workflow-engine-*-windows-x64.zip
