name: Build Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: src
        run: npm ci

      - name: Build frontend
        working-directory: src
        run: npm run build

      - name: Download Python 3.12 embeddable
        run: |
          curl -L -o python-embed.zip https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/embed
          Expand-Archive -Path python-embed.zip -DestinationPath src-tauri/python-runtime/embed
          # Enable pip/site-packages in embedded Python
          $pth = "src-tauri/python-runtime/embed/python312._pth"
          (Get-Content $pth) -replace '#import site', 'import site' | Set-Content $pth
          # Create Lib/site-packages directory
          New-Item -ItemType Directory -Force -Path src-tauri/python-runtime/embed/Lib/site-packages

      - name: Setup Python for Playwright
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright browsers
        run: |
          pip install playwright
          $env:PLAYWRIGHT_BROWSERS_PATH = "${{ github.workspace }}/src-tauri/python-runtime/playwright-browsers"
          python -m playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/src-tauri/python-runtime/playwright-browsers

      - name: Build Tauri (Windows)
        run: npx --prefix src tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
