name: Build ARM64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cli:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build wf-cli
        working-directory: src-tauri
        run: cargo build --bin wf-cli --release

      - name: Upload wf-cli
        uses: actions/upload-artifact@v4
        with:
          name: wf-cli-arm64
          path: src-tauri/target/release/wf-cli

  desktop:
    runs-on: ubuntu-24.04-arm
    needs: cli
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libfuse2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri desktop app
        run: npx tauri build --bundles deb,appimage

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: workflow-engine-arm64-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
